name: Build and Test Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/build.yml'
      - 'entrypoint.sh'
      - 'vnc_startup.sh'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile || true
      
      - name: Validate docker-compose.yml
        run: |
          docker-compose config > /dev/null
      
      - name: Check file permissions
        run: |
          test -x start.sh && echo "✅ start.sh is executable"
          test -x stop.sh && echo "✅ stop.sh is executable"
          test -x manage.sh && echo "✅ manage.sh is executable"
          test -f Dockerfile && echo "✅ Dockerfile exists"

  build:
    name: Build Docker Image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: thorium-vnc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build summary
        run: |
          echo "✅ Docker image built successfully"
          echo "Image size will be verified after build"

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  documentation:
    name: Verify Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check documentation exists
        run: |
          test -f README.md && echo "✅ README.md found"
          test -f BUILD_GUIDE.md && echo "✅ BUILD_GUIDE.md found"
          test -f TESTING.md && echo "✅ TESTING.md found"
          test -f QUICK_START.md && echo "✅ QUICK_START.md found"
      
      - name: Verify key content in README
        run: |
          grep -q "Thorium" README.md && echo "✅ Thorium mentioned"
          grep -q "VNC" README.md && echo "✅ VNC mentioned"
          grep -q "Docker" README.md && echo "✅ Docker mentioned"
          grep -q "localhost:6080" README.md && echo "✅ Access info found"
